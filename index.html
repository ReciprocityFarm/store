let state = { screen:"lang", lang:"en", tier:null, cart:{}, payMode:null };

// Set of crop names currently in stock (populated from the Google Sheet).
// null = not loaded yet / failed → show ALL crops (safe fallback).
let inStock = null;

const app = document.getElementById("app");
const fmt = n => "$" + n.toFixed(2);

// Returns the products to show: filtered by stock if loaded, else all.
function availableProducts() {
  if (!inStock) return PRODUCTS;           // not loaded or failed → show all
  const filtered = PRODUCTS.filter(p => inStock.has(p.name));
  return filtered.length ? filtered : PRODUCTS; // never show an empty store
}

// Parse a simple 2-column CSV (crop,in_stock). Tolerates quotes/spaces/case.
function parseStockCSV(text) {
  const set = new Set();
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  for (let i = 0; i < lines.length; i++) {
    // split on first comma only (crop names have no commas; units aren't here)
    const idx = lines[i].lastIndexOf(",");
    if (idx === -1) continue;
    let crop = lines[i].slice(0, idx).trim().replace(/^"|"$/g, "").trim();
    let val  = lines[i].slice(idx + 1).trim().replace(/^"|"$/g, "").trim().toLowerCase();
    if (crop.toLowerCase() === "crop") continue; // header row
    const yes = (val === "y" || val === "yes" || val === "true" || val === "1");
    if (yes) set.add(crop);
  }
  return set;
}

// Fetch stock from the Google Sheet. On any failure, leave inStock=null (show all).
function loadStock() {
  if (!STOCK_CSV_URL || STOCK_CSV_URL.includes("REPLACE")) return; // not configured
  // cache-bust so toggles show up without a hard refresh
  const url = STOCK_CSV_URL + (STOCK_CSV_URL.includes("?") ? "&" : "?") + "t=" + Date.now();
  fetch(url)
    .then(r => { if (!r.ok) throw new Error("bad status " + r.status); return r.text(); })
    .then(text => {
      const set = parseStockCSV(text);
      if (set.size > 0) {
        inStock = set;
        if (state.screen === "shop") render(); // refresh if already shopping
      }
    })
    .catch(err => { console.warn("Stock sheet not loaded, showing all crops:", err); });
}


function t() { return T[state.lang]; }
function prices() { return state.tier !== null ? TIER_PRICES[String(state.tier)] : {}; }
function cartItems() { return Object.entries(state.cart).filter(([,q]) => q > 0); }
function cartCount() { return cartItems().reduce((s,[,q]) => s+q, 0); }
function cartTotal() { return cartItems().reduce((s,[n,q]) => s + (prices()[n]||0)*q, 0); }
function prodByName(n) { return PRODUCTS.find(p => p.name === n); }

function go(screen) { state.screen = screen; render(); }

function render() {
  if (state.screen === "lang") return renderLang();
  if (state.screen === "tier") return renderTier();
  if (state.screen === "shop") return renderShop();
  if (state.screen === "checkout") return renderCheckout();
  if (state.screen === "paydetail") return renderPayDetail();
  if (state.screen === "thanks") return renderThanks();
}

  const tx = t(), p = prices(), tc = TIER_COLORS[state.tier];
  const tcbg = tc + "1e";
  const tierName = TIER_TEXT[state.lang][state.tier].n;

      <div class="shop-head">
        <div class="shop-head-row">
          <div class="shop-title">${tx.shopTitle}</div>

        </div>
      </div>
      <div class="grid">
        ${availableProducts().map(prod => {
          const qty = state.cart[prod.name] || 0;
          const priceStr = fmt(p[prod.name] || 0);
          return `

            <div class="card-emoji">${prod.emoji}</div>

function renderPayDetail() {
  const tx = t(), total = cartTotal();
  const linkSet = PAYMENT_LINK && !PAYMENT_LINK.includes("REPLACE");
  if (state.payMode === "card") {
    app.innerHTML = `
      <div class="screen">
        <div class="top-bar"><button class="back-btn" id="bk">← ${tx.back}</button></div>
        <div class="pay-detail">
          <div class="pay-amount-card">
            <div class="pay-amount-label">${tx.total}</div>
            <div class="pay-amount-num">${fmt(total)}</div>
          </div>
          <div class="pay-instructions">${tx.cardInstr}</div>
          ${linkSet
            ? `<a class="pay-link-btn" href="${PAYMENT_LINK}" target="_blank" rel="noopener">${tx.openPay} →</a>`
            : `<div style="background:#fff5e8;border:1px solid #e8c98a;border-radius:12px;padding:1rem;font-size:0.85rem;color:#8a6d1f;max-width:340px">⚙️ Payment link not set yet. Open this file and replace PAYMENT_LINK near the top of the script with your Square link.</div>`}
          <button class="done-btn" id="done">${tx.imDone} →</button>
        </div>
      </div>`;
  } else {
    app.innerHTML = `
      <div class="screen">
        <div class="top-bar"><button class="back-btn" id="bk">← ${tx.back}</button></div>
        <div class="pay-detail">
          <div class="cash-icon">💵</div>
          <div class="pay-amount-card">
            <div class="pay-amount-label">${tx.cashTitle}</div>
            <div class="pay-amount-num">${fmt(total)}</div>
          </div>
          <div class="pay-instructions">${tx.cashInstr}</div>
          <button class="pay-link-btn" id="done2">${tx.imDone} →</button>
        </div>
      </div>`;
  }
  app.querySelector("#bk").onclick = () => go("checkout");
  const d1 = app.querySelector("#done"), d2 = app.querySelector("#done2");
  if (d1) d1.onclick = () => go("thanks");
  if (d2) d2.onclick = () => go("thanks");
}

function renderThanks() {
  const tx = t();
  app.innerHTML = `
    <div class="screen ty-screen">
      <div class="ty-icon">🌾</div>
      <div class="ty-title">${tx.thanks}</div>
      <div class="ty-sub">${tx.thanksSub}</div>
      <button class="ty-restart" id="rs">${tx.startOver}</button>
    </div>`;
  app.querySelector("#rs").onclick = () => { state = { screen:"lang", lang:"en", tier:null, cart:{}, payMode:null }; render(); };
}

loadStock();
render();
</script>
</body>
</html>
